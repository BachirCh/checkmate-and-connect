name: Lighthouse CI

on:
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Netlify Preview Deploy
        uses: jakepartusch/wait-for-netlify-action@v1.4
        id: wait-for-deploy
        with:
          site_name: checkmate-connect
          max_timeout: 600
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            ${{ steps.wait-for-deploy.outputs.url }}
            ${{ steps.wait-for-deploy.outputs.url }}/members
            ${{ steps.wait-for-deploy.outputs.url }}/admin
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));

            let comment = '## Lighthouse CI Results\\n\\n';
            comment += `Preview URL: ${process.env.DEPLOY_URL}\\n\\n`;
            comment += '| Page | Performance | Accessibility | Best Practices | SEO |\\n';
            comment += '|------|-------------|---------------|----------------|-----|\\n';

            results.forEach(result => {
              const url = new URL(result.url);
              const page = url.pathname || '/';
              const scores = result.summary;
              comment += `| ${page} | ${scores.performance} | ${scores.accessibility} | ${scores['best-practices']} | ${scores.seo} |\\n`;
            });

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
        env:
          DEPLOY_URL: ${{ steps.wait-for-deploy.outputs.url }}
